[package]
name = "nes-emulator"
version = "0.1.0"
edition = "2024"

[features]
ram64kb = []

[dependencies]
bitfields = "1.0.0"
bitflags = "2.9.1"
sdl2 = "0.38.0"
bitcode = "0.6.6"
flate2 = "1.1.2"
# sha1_smol = "1.0.1"
crc32fast = "1.5.0"
getrandom = "0.3.3"
zip = "5.1.1"

[dev-dependencies]
bincode = { version = "2.0.1", features = ["serde"] }
bitcode = { version = "0.6.6", features = ["serde"] }
ciborium = "0.2.2"
flate2 = "1.1.2"
pretty_assertions = "1.4.1"
rmp-serde = "1.3.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.142"
